services:
  edison-analysis-demo:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: ${PORT:?8765}
      EDISON_API_KEY: ${EDISON_API_KEY:?}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PORT', '8765') + '/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
